name: chatbot-api CI

on:
  push:
    branches: [main]
    paths:
      - 'chatbot-claude/chatbot-api/**'
      - '.github/workflows/chatbot-api.yml'
  pull_request:
    paths:
      - 'chatbot-claude/chatbot-api/**'
      - '.github/workflows/chatbot-api.yml'

defaults:
  run:
    working-directory: chatbot-claude/chatbot-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build
        # The @SpringBootTest context wires the Anthropic client from this property.
        # Tests never call the real API (the eval suite is tag-excluded from `build`),
        # so a placeholder value is enough to load the context deterministically.
        env:
          ANTHROPIC_API_KEY: dummy-key-context-load-only

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: chatbot-claude/chatbot-api/build/reports/tests/test/
          retention-days: 7
