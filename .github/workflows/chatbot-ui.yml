name: chatbot-ui CI

on:
  push:
    branches: [main]
    paths:
      - 'chatbot-claude/chatbot-ui/**'
      - '.github/workflows/chatbot-ui.yml'
  pull_request:
    paths:
      - 'chatbot-claude/chatbot-ui/**'
      - '.github/workflows/chatbot-ui.yml'

defaults:
  run:
    working-directory: chatbot-claude/chatbot-ui

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chatbot-claude/chatbot-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('chatbot-claude/chatbot-ui/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: chatbot-claude/chatbot-ui/playwright-report/
          retention-days: 7
