spring:
  application:
    name: chatbot-api
  jackson:
    serialization:
      indent-output: true
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096

chatbot:
  system-prompt: classpath:/prompts/tax-system-prompt.st
  max-messages: 100

logging:
  level:
    com.example.chatbot.api.controller.ChatbotApiController: DEBUG
